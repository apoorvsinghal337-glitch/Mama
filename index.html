<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Gift for Mama Ji</title>
</head>
<body>

    <!-- First Phase -->
    <div id="page1" class="container">
        <h1>Namaste Mama Ji! ❤️</h1>
        <p>Aapke liye ek chhota sa surprise hai...</p>
        <button onclick="showPage2()">Click Here for a Surprise</button>
    </div>

    <!-- Second Phase -->
    <div id="page2" class="container" style="display:none;">
        <h2>Aapke liye ek special tohfa!</h2>
        <p>Mama, aap mere liye bahut special hain. Aapki har khushi mere liye mayne rakhti hai. Mere dil ki ye baat suniye:</p>
        
        <!-- Audio Section -->
        <div class="audio-section" style="margin: 20px 0;">
            <audio controls>
                <source src="https://mp3tourl.com/audio/1782063760843-d870a772-a81e-4d0a-9ca0-04ee67ea1335.mp3" type="audio/mpeg">
                Aapka browser audio support nahi karta.
            </audio>
        </div>

        <div class="product-card">
            <h3>Titan Octane Watch</h3>
            <p>Ye ghadi mujhe aapke liye bahut pasand aayi.</p>
            <br>
            <a href="https://amzn.in/d/01jjGJc6" target="_blank" class="buy-button">Yahan Dekhein & Buy Karein</a>
        </div>
    </div>

    <script>
        function showPage2() {
            document.getElementById('page1').style.display = 'none';
            document.getElementById('page2').style.display = 'block';
        }
    </script>
</body>
</html>
